name: Phishing Detection CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run comprehensive tests
      run: |
        python test_comprehensive.py
    
    - name: Run feature tests
      run: |
        python test_features.py
    
    - name: Run prediction tests
      run: |
        python test_prediction.py
    
    - name: Lint with flake8 (optional)
      run: |
        pip install flake8
        # Stop if there are critical syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Test model loading
      run: |
        python -c "import joblib; model = joblib.load('models/phishing_model.pkl'); print(f'Model loaded successfully with {len(model.feature_names_in_)} features')"
    
    - name: Verify brands file
      run: |
        lines=$(wc -l < data/brands.txt)
        echo "Brands file has $lines entries"
        if [ "$lines" -lt 100 ]; then
          echo "Warning: brands.txt has less than 100 entries"
        fi
